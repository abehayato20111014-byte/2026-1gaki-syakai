<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記述式クイズアプリ</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-xl font-bold text-gray-800">記述式クイズ</h1>
      <span id="progress" class="text-sm bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-semibold">1/3</span>
    </div>

    <div id="quiz-screen">
      <p id="question-text" class="text-lg text-gray-700 font-medium mb-6 min-h-[3.5rem]">
        問題文がここに表示されます。
      </p>

      <div class="space-y-4">
        <input 
          type="text" 
          id="answer-input" 
          placeholder="答えを入力してください" 
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-lg"
          autocomplete="off"
        >
        <button 
          id="submit-btn" 
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors cursor-pointer"
        >
          回答を送信
        </button>
      </div>

      <div id="feedback" class="mt-6 p-4 rounded-lg hidden">
        <p id="feedback-result" class="font-bold text-lg mb-1"></p>
        <p id="feedback-explanation" class="text-sm text-gray-600"></p>
      </div>
    </div>

    <div id="result-screen" class="hidden text-center py-6">
      <h2 class="text-2xl font-bold text-gray-800 mb-2">クイズ終了！</h2>
      <p class="text-xl text-gray-600 mb-6">
        あなたのスコア: <span id="final-score" class="text-3xl font-bold text-blue-600">0</span> / <span id="total-score">0</span>
      </p>
      <button 
        id="restart-btn" 
        class="bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-6 rounded-lg transition-colors cursor-pointer"
      >
        もう一度挑戦する
      </button>
    </div>
  </div>

  <script>
    // 1. クイズデータの配列（ここを自由に変更・追加してください）
    const quizDataset = [
      {
        id: 1,
        question: "日本の現在の首都はどこでしょう？",
        correctAnswers: ["東京", "とうきょう", "tokyo"],
        explanation: "日本の事実上の首都は東京です。"
      },
      {
        id: 2,
        question: "Webサイトの見た目（スタイル）を整えるために使われる言語の略称は？",
        correctAnswers: ["CSS", "css"],
        explanation: "Cascading Style Sheetsの略です。"
      },
      {
        id: 3,
        question: "リンゴを英語で言うと？",
        correctAnswers: ["apple", "Apple", "アップル"],
        explanation: "身近な果物の英単語ですね。"
      }
    ];

    // 2. クイズエンジンのクラス（JavaScript版）
    class SubjectiveQuizEngine {
      constructor(questions) {
        this.questions = questions;
        this.currentQuestionIndex = 0;
        this.score = 0;
      }

      getCurrentQuestion() {
        if (this.isFinished()) return null;
        return this.questions[this.currentQuestionIndex];
      }

      submitAnswer(userInput) {
        const currentQuestion = this.getCurrentQuestion();
        if (!currentQuestion) return false;

        const sanitizedInput = userInput.trim().toLowerCase();
        const isCorrect = currentQuestion.correctAnswers.some(
          answer => answer.trim().toLowerCase() === sanitizedInput
        );

        if (isCorrect) this.score++;
        this.currentQuestionIndex++;
        return isCorrect;
      }

      isFinished() {
        return this.currentQuestionIndex >= this.questions.length;
      }

      getScore() { return this.score; }
      getTotalQuestions() { return this.questions.length; }
      getCurrentIndex() { return this.currentQuestionIndex; }

      reset() {
        this.currentQuestionIndex = 0;
        this.score = 0;
      }
    }

    // 3. UIの制御ロジック
    const quiz = new SubjectiveQuizEngine(quizDataset);

    // DOM要素の取得
    const progressEl = document.getElementById('progress');
    const questionTextEl = document.getElementById('question-text');
    const answerInputEl = document.getElementById('answer-input');
    const submitBtnEl = document.getElementById('submit-btn');
    const feedbackEl = document.getElementById('feedback');
    const feedbackResultEl = document.getElementById('feedback-result');
    const feedbackExplanationEl = document.getElementById('feedback-explanation');
    const quizScreenEl = document.getElementById('quiz-screen');
    const resultScreenEl = document.getElementById('result-screen');
    const finalScoreEl = document.getElementById('final-score');
    const totalScoreEl = document.getElementById('total-score');
    const restartBtnEl = document.getElementById('restart-btn');

    // クイズ画面の更新
    function updateScreen() {
      if (quiz.isFinished()) {
        showResult();
        return;
      }

      const currentQuestion = quiz.getCurrentQuestion();
      
      // 問題と進行度の表示
      progressEl.textContent = `${quiz.getCurrentIndex() + 1} / ${quiz.getTotalQuestions()}`;
      questionTextEl.textContent = currentQuestion.question;
      
      // 入力欄とフィードバックのリセット
      answerInputEl.value = '';
      answerInputEl.disabled = false;
      feedbackEl.classList.add('hidden');
      submitBtnEl.textContent = "回答を送信";
    }

    // 結果画面の表示
    function showResult() {
      quizScreenEl.classList.add('hidden');
      resultScreenEl.classList.remove('hidden');
      progressEl.classList.add('hidden');
      
      finalScoreEl.textContent = quiz.getScore();
      totalScoreEl.textContent = quiz.getTotalQuestions();
    }

    // 回答送信ボタンの処理
    submitBtnEl.addEventListener('click', () => {
      // 「次へ進む」状態のときの処理
      if (feedbackEl.classList.contains('hidden') === false) {
        updateScreen();
        return;
      }

      const userInput = answerInputEl.value;
      if (!userInput.trim()) {
        alert('回答を入力してください！');
        return;
      }

      // 判定前に現在の問題の解説を取得しておく
      const currentQuestion = quiz.getCurrentQuestion();
      
      // 回答を提出 (内部インデックスが進む)
      const isCorrect = quiz.submitAnswer(userInput);

      // フィードバックの表示
      answerInputEl.disabled = true;
      feedbackEl.classList.remove('hidden');
      
      if (isCorrect) {
        feedbackEl.className = "mt-6 p-4 rounded-lg bg-green-50 border border-green-200";
        feedbackResultEl.textContent = "⭕ 正解！";
        feedbackResultEl.className = "font-bold text-lg text-green-700 mb-1";
      } else {
        feedbackEl.className = "mt-6 p-4 rounded-lg bg-red-50 border border-red-200";
        feedbackResultEl.textContent = `❌ 不正解... (正解例: ${currentQuestion.correctAnswers[0]})`;
        feedbackResultEl.className = "font-bold text-lg text-red-700 mb-1";
      }

      feedbackExplanationEl.textContent = currentQuestion.explanation || "";
      submitBtnEl.textContent = "次へ進む";
    });

    // Enterキーでも回答送信できるようにする
    answerInputEl.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') submitBtnEl.click();
    });

    // リスタートボタンの処理
    restartBtnEl.addEventListener('click', () => {
      quiz.reset();
      quizScreenEl.classList.remove('hidden');
      resultScreenEl.classList.add('hidden');
      progressEl.classList.remove('hidden');
      updateScreen();
    });

    // アプリ起動
    updateScreen();
  </script>
</body>
</html>
