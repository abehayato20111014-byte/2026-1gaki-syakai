<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歴史記述式クイズ・特訓システム</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for premium visual look -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.5);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-2 sm:p-4 selection:bg-amber-500 selection:text-slate-950">

<div class="bg-slate-900/90 border border-slate-800 rounded-3xl shadow-2xl max-w-3xl w-full p-4 sm:p-8 backdrop-blur-md relative overflow-hidden">
    <!-- 装飾的な背景グラデーション -->
    <div class="absolute -top-40 -left-40 w-80 h-80 bg-amber-500/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute -bottom-40 -right-40 w-80 h-80 bg-orange-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <!-- 上部グローバルバー -->
    <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4 relative z-10">
        <div class="flex items-center gap-2">
            <div class="bg-amber-500 text-slate-950 p-2 rounded-xl shadow-lg shadow-amber-500/20">
                <i data-lucide="graduation-cap" class="w-6 h-6"></i>
            </div>
            <div>
                <span class="text-xs text-amber-500 font-bold tracking-wider uppercase block">History Master</span>
                <h1 class="text-lg sm:text-xl font-black text-slate-100">歴史記述式 特訓アプリ</h1>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <!-- 音量切替 -->
            <button onclick="toggleMute()" id="mute-btn" class="p-2.5 rounded-xl bg-slate-800 hover:bg-slate-700 border border-slate-700/60 transition-all text-slate-300 hover:text-white" title="音量の切替">
                <i data-lucide="volume-2" class="w-5 h-5"></i>
            </button>
            <!-- 復習モードショートカット -->
            <button onclick="startWeaknessMode()" class="flex items-center gap-2 px-3 py-2 rounded-xl bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/30 transition-all text-rose-400 font-bold text-xs" title="苦手問題を解く">
                <i data-lucide="bell-ring" class="w-4 h-4"></i>
                <span id="weakness-count-badge">苦手: 0問</span>
            </button>
        </div>
    </div>

    <!-- 1. メニュー画面 -->
    <div id="menu-screen" class="space-y-6 relative z-10">
        <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700/50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h2 class="font-bold text-slate-200 flex items-center gap-1.5 text-sm sm:text-base">
                    <i data-lucide="settings" class="w-4 h-4 text-amber-500"></i>アプリ設定
                </h2>
                <p class="text-xs text-slate-400 mt-1">クイズをより自分好みにカスタマイズできます。</p>
            </div>
            <div class="flex items-center gap-4 w-full sm:w-auto">
                <!-- タイマー設定 -->
                <label class="flex items-center gap-2 cursor-pointer bg-slate-900/60 px-3 py-2 rounded-xl border border-slate-800 w-full sm:w-auto justify-center">
                    <input type="checkbox" id="timer-toggle" class="rounded text-amber-500 focus:ring-amber-500 bg-slate-800 border-slate-700" checked>
                    <span class="text-xs font-bold text-slate-300">タイマー有 (30秒)</span>
                </label>
            </div>
        </div>

        <div>
            <h2 class="text-base font-extrabold text-slate-300 mb-3 flex items-center gap-2">
                <i data-lucide="book-open" class="w-5 h-5 text-amber-400"></i>特訓モードを選択
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[420px] overflow-y-auto pr-1 custom-scrollbar" id="modes-list">
                <!-- JavaScriptで各モードの進行率付きボタンを動的生成 -->
            </div>
        </div>

        <!-- 全範囲挑戦ボタン -->
        <div class="pt-2">
            <button onclick="startQuiz(8)" class="w-full relative group overflow-hidden bg-gradient-to-r from-amber-500 via-orange-500 to-amber-600 text-slate-950 font-black p-4 rounded-2xl transition-all duration-300 hover:shadow-xl hover:shadow-amber-500/20 flex justify-between items-center cursor-pointer">
                <div class="absolute inset-0 w-full h-full bg-white/10 transform -skew-x-12 -translate-x-full group-hover:animate-[shine_0.8s_ease-in-out]"></div>
                <div class="flex items-center gap-2.5 text-left">
                    <div class="bg-slate-950/20 p-2 rounded-xl">
                        <i data-lucide="zap" class="w-5 h-5 text-slate-950"></i>
                    </div>
                    <div>
                        <span class="block text-sm font-extrabold uppercase tracking-wide opacity-80">Final Exam</span>
                        <span class="block text-base font-black">第8モード：全範囲限界突破ランダム（30問）</span>
                    </div>
                </div>
                <i data-lucide="arrow-right" class="w-6 h-6 transition-transform group-hover:translate-x-1.5"></i>
            </button>
        </div>
    </div>

    <!-- 2. クイズプレイ画面 -->
    <div id="play-screen" class="hidden space-y-6 relative z-10">
        <!-- 進行状況ステータス -->
        <div class="flex justify-between items-center bg-slate-850 px-4 py-3 rounded-2xl border border-slate-800">
            <div class="flex items-center gap-2">
                <span id="quiz-mode-badge" class="text-xs font-black text-amber-400 bg-amber-400/10 px-2.5 py-1 rounded-lg border border-amber-500/20 uppercase tracking-wider">第1モード</span>
                <span id="timer-badge" class="text-xs font-bold text-slate-300 bg-slate-800 px-2 py-1 rounded-lg flex items-center gap-1">
                    <i data-lucide="clock" class="w-3.5 h-3.5 text-amber-500"></i>
                    <span id="timer-sec">30</span>秒
                </span>
            </div>
            <span id="quiz-progress" class="text-xs text-slate-400 font-mono font-bold">1 / 10</span>
        </div>

        <!-- タイマープログレスバー -->
        <div id="timer-bar-container" class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
            <div id="timer-bar" class="h-full bg-amber-500 transition-all duration-100" style="width: 100%"></div>
        </div>

        <!-- 問題表示 -->
        <div class="bg-slate-800/40 p-6 rounded-2xl border border-slate-800/80 relative">
            <span class="absolute -top-3 left-6 px-3 py-0.5 bg-slate-900 border border-slate-800 rounded-full text-[10px] font-bold text-slate-400 uppercase tracking-widest">Question</span>
            <p id="quiz-question" class="text-base sm:text-lg font-bold leading-relaxed text-slate-100 pt-1">
                ここに問題が表示されます。
            </p>
        </div>

        <!-- 入力フィールド -->
        <div class="space-y-3">
            <label for="user-answer" class="block text-xs font-bold text-slate-400 uppercase tracking-widest">あなたの解答 (平仮名での記述も正解判定します)：</label>
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="text" id="user-answer" placeholder="漢字・ひらがな・西暦などを入力..." 
                       class="w-full bg-slate-950 border-2 border-slate-800 rounded-xl px-4 py-3.5 text-base sm:text-lg text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent transition-all font-medium"
                       autocomplete="off" onkeydown="handleEnterKey(event)">
                <button id="submit-btn" onclick="submitUserAnswer()" 
                        class="w-full sm:w-auto bg-amber-500 hover:bg-amber-400 text-slate-950 font-black px-8 py-3.5 rounded-xl transition-all shadow-lg shadow-amber-500/10 active:scale-95 cursor-pointer whitespace-nowrap text-center">
                    判定する
                </button>
            </div>
        </div>

        <!-- 判定結果フィードバック（初期状態非表示） -->
        <div id="feedback-panel" class="hidden p-5 rounded-2xl border transition-all duration-300">
            <div class="flex items-start gap-3">
                <span id="feedback-icon" class="text-2xl sm:text-3xl">⭕</span>
                <div class="space-y-1 w-full">
                    <div class="flex justify-between items-start gap-4">
                        <h3 id="feedback-title" class="font-extrabold text-base sm:text-lg">正解！</h3>
                        <!-- おまけ救済ボタン -->
                        <button id="override-btn" onclick="overrideAsCorrect()" class="text-[11px] font-bold bg-slate-850 hover:bg-slate-800 text-slate-300 border border-slate-700 rounded-lg px-2.5 py-1 transition-all flex items-center gap-1 cursor-pointer">
                            <i data-lucide="check-square" class="w-3.5 h-3.5 text-amber-500"></i>
                            今のを正解扱いにする
                        </button>
                    </div>
                    <p id="feedback-correct-answers" class="text-sm font-bold text-white"></p>
                    <p id="feedback-explanation" class="text-xs sm:text-sm text-slate-300 leading-relaxed pt-2 border-t border-white/10 mt-2"></p>
                </div>
            </div>
        </div>

        <!-- 次へボタン -->
        <div class="flex justify-end pt-2">
            <button id="next-btn" onclick="goToNextQuestion()" 
                    class="hidden w-full sm:w-auto bg-slate-800 hover:bg-slate-700 text-white font-bold px-8 py-3.5 rounded-xl transition-all cursor-pointer border border-slate-700 flex items-center justify-center gap-2">
                <span>次の問題へ</span>
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <!-- 3. リザルト画面 -->
    <div id="result-screen" class="hidden text-center py-6 space-y-6 relative z-10">
        <div class="inline-block bg-amber-500/10 text-amber-400 p-4 rounded-full border border-amber-500/20">
            <i data-lucide="trophy" class="w-12 h-12"></i>
        </div>
        <div>
            <h2 class="text-2xl sm:text-3xl font-black text-slate-100">特訓完了！</h2>
            <p class="text-xs text-slate-400 mt-1">やりきりましたね。今回の結果は以下の通りです。</p>
        </div>
        
        <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto">
            <div class="bg-slate-800/40 border border-slate-800 rounded-2xl p-4">
                <span class="block text-slate-400 text-[10px] font-bold uppercase tracking-wider">正解数</span>
                <span id="result-score" class="text-2xl sm:text-3xl font-black text-amber-400">0 / 0</span>
            </div>
            <div class="bg-slate-800/40 border border-slate-800 rounded-2xl p-4">
                <span class="block text-slate-400 text-[10px] font-bold uppercase tracking-wider">正解率</span>
                <span id="result-percent" class="text-2xl sm:text-3xl font-black text-emerald-400 font-mono">0%</span>
            </div>
        </div>

        <div class="max-w-md mx-auto p-4 bg-slate-850/80 rounded-2xl border border-slate-800">
            <p id="result-comment" class="text-xs sm:text-sm text-slate-300 leading-relaxed font-semibold">コメント</p>
        </div>

        <div class="pt-4 flex flex-col sm:flex-row justify-center gap-2.5">
            <button onclick="restartCurrentMode()" class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-extrabold px-6 py-3 rounded-xl transition-all cursor-pointer shadow-lg shadow-amber-500/10">
                同じモードをもう一度
            </button>
            <button onclick="backToMenu()" class="bg-slate-800 hover:bg-slate-700 text-white font-extrabold px-6 py-3 rounded-xl transition-all cursor-pointer border border-slate-700">
                メニューに戻る
            </button>
        </div>
    </div>
</div>

<script>
    // --- 音声効果音システム（Web Audio APIを使用するため外部アセット不要） ---
    let isMuted = false;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (isMuted) return;
        
        // ユーザーインタラクション制限の解除
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'correct') {
            // ピンポン♪（2つの高いピッチ音）
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, now); // C5
            osc.frequency.setValueAtTime(659.25, now + 0.12); // E5
            gainNode.gain.setValueAtTime(0.15, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        } else if (type === 'incorrect') {
            // ブブー♪（低いピッチの鋸歯状波）
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.setValueAtTime(120, now + 0.15);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else if (type === 'click') {
            // カチッ
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1000, now);
            gainNode.gain.setValueAtTime(0.05, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc.start(now);
            osc.stop(now + 0.05);
        }
    }

    function toggleMute() {
        isMuted = !isMuted;
        const btn = document.getElementById('mute-btn');
        if (isMuted) {
            btn.innerHTML = '<i data-lucide="volume-x" class="w-5 h-5 text-slate-500"></i>';
        } else {
            btn.innerHTML = '<i data-lucide="volume-2" class="w-5 h-5 text-slate-300"></i>';
            playSound('click');
        }
        lucide.createIcons();
    }

    // --- 超網羅的問題データベース ---
    // 各問題について「いつ」「だれ」「なに」の複数切り口を大量に作成し、ひらがな・漢字を多重登録
    const quizDatabase = {
        // 第1モード：アヘン戦争～清・インドの侵略対応
        1: [
            {
                q: "アヘン戦争の後に清とイギリスの間で結ばれた、1842年の最初の不平等条約は何か？",
                ans: ["南京条約", "なんきんじょうやく", "なんきん", "南京"],
                exp: "1842年に結ばれた不平等条約。これにより清は香港の割譲や5港の開港を強制されました。"
            },
            {
                q: "イギリスが清から大量に輸入し、貿易不均衡を引き起こした中国名産の嗜好品は何か？",
                ans: ["お茶", "茶", "ちゃ"],
                exp: "イギリスでは喫茶の習慣が流行し、茶の輸入による赤字分を補うためにアヘン密輸を開始しました。"
            },
            {
                q: "イギリス、インド、清の間で行われた、アヘンや茶、綿織物を巡る3国間の不均等な貿易構造を何というか？",
                ans: ["三角貿易", "さんかくぼうえき", "さんかく"],
                exp: "イギリスがインドに綿織物を送り、インドから清へアヘンを送り、清からイギリスに茶を送るシステムです。"
            },
            {
                q: "アヘン戦争が勃発した年は西暦何年か？",
                ans: ["1840年", "1840", "１８４０", "1840ねん"],
                exp: "1840年、清の林則徐によるアヘン没収処分を機にイギリス軍が清を攻撃しました。"
            },
            {
                q: "1851年に太平天国の乱を興し、自らをキリストの弟と称して理想郷を掲げた指導者は誰か？",
                ans: ["洪秀全", "こうしゅうぜん"],
                exp: "洪秀全は宗教団体「拝上帝会」を率い、清朝を滅ぼし漢民族の国を復興する運動を展開しました。"
            },
            {
                q: "洪秀全らが唱えた、満州族の清を滅ぼして漢民族を再び興すという政治スローガンは何か？",
                ans: ["滅満興漢", "めつまんこうかん"],
                exp: "太平天国の乱で掲げられたスローガンです。"
            },
            {
                q: "インドでイギリス東インド会社のインド人傭兵たちが蜂起し、大規模な抗英運動となった事件を何というか？",
                ans: ["セポイの乱", "セポイの反乱", "インド大反乱", "しぱーひーのらん", "シパーヒーの乱"],
                exp: "1857年。新式ライフルの弾薬筒に牛脂や豚脂が使われているという噂に、宗教的理由から反発したことが発端です。"
            },
            {
                q: "インド人傭兵らによるセポイの乱（インド大反乱）が始まった年は西暦何年か？",
                ans: ["1857年", "1857", "１８５７", "1857ねん"],
                exp: "1857年に勃発し、その後イギリス東インド会社は解散に追い込まれました。"
            }
        ],
        // 第2モード：開国から江戸時代の滅亡
        2: [
            {
                q: "1853年、アメリカ大統領の国書を携えて4隻の黒船を率いて来航し、開国を迫った人物は誰か？",
                ans: ["ペリー", "ぺりー", "マシュー・ペリー"],
                exp: "アメリカ東インド艦隊司令長官。1853年に浦賀に来航して開国を強く迫りました。"
            },
            {
                q: "ペリー率いるアメリカ艦隊が最初に日本に来航した年は西暦何年か？",
                ans: ["1853年", "1853", "１８５３", "1853ねん"],
                exp: "1853年に浦賀（神奈川県）へ現れ、幕府に衝撃を与えました。"
            },
            {
                q: "1854年に結ばれ、下田・箱館の2港を開いて鎖国政策にピリオドを打った条約は何か？",
                ans: ["日米和親条約", "にちべいわしんじょうやく"],
                exp: "翌1854年にペリーが再び来航し、この和親条約を締結しました。"
            },
            {
                q: "1858年、朝廷の勅許を得ないまま独断で署名し、5港を開港した不平等通商条約は何か？",
                ans: ["日米修好通商条約", "にちべいしゅうこうつうしょうじょうやく"],
                exp: "大老の井伊直弼が、ハリスの要求に応じて勅許なしで調印しました。"
            },
            {
                q: "日米修好通商条約を朝廷の許可なく独断で結んだ、安政の大獄でも知られる大老は誰か？",
                ans: ["井伊直弼", "いいなおすけ"],
                exp: "不平等を非難する尊王攘夷派の公家や志士らを安政の大獄で厳しく弾圧しました。"
            },
            {
                q: "1860年、大老の井伊直弼が桜田門付近で水戸浪士らに暗殺された事件を何というか？",
                ans: ["桜田門外の変", "さくらだもんがいのへん", "桜田門外の変"],
                exp: "井伊直弼の暗殺により幕府の権威は大きく失墜していきました。"
            },
            {
                q: "1866年、坂本龍馬らの仲介により、長年対立していた薩摩藩と長州藩の間で結ばれた政治軍事同盟は何か？",
                ans: ["薩長同盟", "さっちょうどうめい"],
                exp: "薩摩の西郷隆盛・小松帯刀、長州の木戸孝允らが土佐の坂本龍馬らの斡旋で和解・結託しました。"
            },
            {
                q: "1867年、土佐藩などの進言を受け、第15代将軍徳川慶喜が政権を朝廷に返還した出来事を何というか？",
                ans: ["大政奉還", "たいせいほうかん"],
                exp: "将軍慶喜は天皇を中心とする新体制でも実権を握る計画でしたが、討幕派に先手を打たれました。"
            },
            {
                q: "大政奉還を行い、江戸幕府最後の将軍となった第15代征夷大将軍は誰か？",
                ans: ["徳川慶喜", "とくがわよしのぶ", "よしのぶ"],
                exp: "のちの戊辰戦争（1868年〜1869年）に敗北し、静岡に引退しました。"
            }
        ],
        // 第3モード：明治維新と三大改革
        3: [
            {
                q: "1868年、明治天皇が神に誓う形で新政府の政治理念を示した宣言を何というか？",
                ans: ["五箇条の御誓文", "ごかじょうのごせいもん", "ごかじょう"],
                exp: "話し合いによる合意形成や、開国和親、旧習打破などを宣言しました。"

    // --- 高度な日本語回答マッチングシステム ---
    // カタカナ・平仮名の変換テーブル
    function hiraganize(str) {
        if (!str) return "";
        // 全角英数字を半角英数字に変換
        let val = str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
            return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        });
        // カタカナをひらがなに変換
        val = val.replace(/[\u30a1-\u30f6]/g, function(match) {
            var chr = match.charCodeAt(0) - 0x60;
            return String.fromCharCode(chr);
        });
        // スペース、句読点、余計な「年」「ねん」「ねんごろ」などの記号をトリム
        val = val.replace(/[\s　、。・\/\\_+\-*]/g, "");
        val = val.replace(/ねん$/, "");
        val = val.replace(/年$/, "");
        val = val.replace(/ごろ$/, "");
        val = val.replace(/頃$/, "");
        return val.toLowerCase();
    }

            const currentProgress = modeProgress[i] || 0;
            const buttonHtml = `
                <button onclick="startQuiz(${i})" class="w-full text-left p-4 rounded-2xl bg-slate-800/40 hover:bg-slate-800 hover:scale-[1.01] border border-slate-800 hover:border-amber-500/30 transition-all duration-200 group flex justify-between items-center cursor-pointer">
                    <div class="space-y-1">
                        <span class="block font-bold text-slate-200 text-sm sm:text-base group-hover:text-amber-400 transition-colors">${modeNames[i]}</span>
                        <div class="flex items-center gap-2">
                            <div class="w-24 sm:w-32 bg-slate-900 rounded-full h-1.5 overflow-hidden border border-slate-800">
                                <div class="bg-amber-500 h-full rounded-full transition-all" style="width: ${currentProgress}%"></div>
                            </div>
                            <span class="text-[10px] text-slate-400 font-bold font-mono">${currentProgress}% 完了</span>
                        </div>
                    </div>
                    <i data-lucide="play-circle" class="w-6 h-6 text-slate-500 group-hover:text-amber-500 transition-colors"></i>
                </button>
            `;
            container.innerHTML += buttonHtml;
        }
        lucide.createIcons();
        updateWeaknessBadge();
    }

    // クイズ開始
    function startQuiz(mode) {
        playSound('click');
        activeMode = mode;
        activeIndex = 0;
        totalScore = 0;

        if (mode === 8) {
            // 第8モード：全問題から30問シャッフル
            let all = [];
            for (let m in quizDatabase) {
                all = all.concat(quizDatabase[m]);
            }
            all.sort(() => Math.random() - 0.5);
            activeQuestions = all.slice(0, 30);
            document.getElementById('quiz-mode-badge').textContent = "全範囲ランダム";
        } else {
            // 各通常モード
            activeQuestions = [...quizDatabase[mode]];
            activeQuestions.sort(() => Math.random() - 0.5);
            document.getElementById('quiz-mode-badge').textContent = `第${mode}モード`;
        }

        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('play-screen').classList.remove('hidden');

        loadQuestion();
    }

    // 苦手特訓モードの起動
    function startWeaknessMode() {
        if (weaknessList.length === 0) {
            alert("まだ間違えた問題（苦手な問題）が保存されていません！クイズをプレイして間違えると、自動的にここにたまります。");
            return;
        }
        playSound('click');
        activeMode = 'weakness';
        activeIndex = 0;
        totalScore = 0;
        activeQuestions = [...weaknessList];
        activeQuestions.sort(() => Math.random() - 0.5);

        document.getElementById('quiz-mode-badge').textContent = "苦手特訓モード";
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('play-screen').classList.remove('hidden');

        loadQuestion();
    }

    // 問題のロード
    function loadQuestion() {
        stopTimer();
        
        const feedbackPanel = document.getElementById('feedback-panel');
        const submitBtn = document.getElementById('submit-btn');
        const nextBtn = document.getElementById('next-btn');
        const answerInput = document.getElementById('user-answer');

        feedbackPanel.classList.add('hidden');
        nextBtn.classList.add('hidden');
        submitBtn.classList.remove('hidden');

        answerInput.value = "";
        answerInput.disabled = false;
        answerInput.focus();

        document.getElementById('quiz-progress').textContent = `${activeIndex + 1} / ${activeQuestions.length}`;
        document.getElementById('quiz-question').textContent = activeQuestions[activeIndex].q;

        // タイマー開始
        if (document.getElementById('timer-toggle').checked) {
            document.getElementById('timer-badge').classList.remove('hidden');
            document.getElementById('timer-bar-container').classList.remove('hidden');
            startTimer();
        } else {
            document.getElementById('timer-badge').classList.add('hidden');
            document.getElementById('timer-bar-container').classList.add('hidden');
        }
    }

    // タイマー管理
    function startTimer() {
        timerValue = timerDuration;
        document.getElementById('timer-sec').textContent = timerValue;
        document.getElementById('timer-bar').style.width = "100%";
        document.getElementById('timer-bar').className = "h-full bg-amber-500 transition-all duration-100";

        currentTimerId = setInterval(() => {
            timerValue--;
            document.getElementById('timer-sec').textContent = timerValue;
            
            const pct = (timerValue / timerDuration) * 100;
            document.getElementById('timer-bar').style.width = `${pct}%`;

            if (timerValue <= 10) {
                document.getElementById('timer-bar').className = "h-full bg-rose-500 transition-all duration-100 animate-pulse";
            }

            if (timerValue <= 0) {
                stopTimer();
                autoIncorrectByTimeout();
            }
        }, 1000);
    }

    function stopTimer() {
        if (currentTimerId) {
            clearInterval(currentTimerId);
            currentTimerId = null;
        }
    }

    // 時間切れ時の自動不正解
    function autoIncorrectByTimeout() {
        playSound('incorrect');
        const currentQ = activeQuestions[activeIndex];
        const feedbackPanel = document.getElementById('feedback-panel');
        const submitBtn = document.getElementById('submit-btn');
        const nextBtn = document.getElementById('next-btn');
        const answerInput = document.getElementById('user-answer');

        answerInput.disabled = true;
        submitBtn.classList.add('hidden');
        nextBtn.classList.remove('hidden');

        // 苦手登録
        addToWeakness(currentQ);

        feedbackPanel.classList.remove('hidden');
        feedbackPanel.className = "p-5 rounded-2xl border border-rose-500/30 bg-rose-500/10 text-rose-300 fade-in";
        document.getElementById('feedback-icon').textContent = "⏰";
        document.getElementById('feedback-title').textContent = "時間切れ...";
        document.getElementById('feedback-correct-answers').innerHTML = `正解: <span class="text-white underline decoration-amber-400 font-bold">${currentQ.ans.join("、")}</span>`;
        document.getElementById('feedback-explanation').textContent = currentQ.exp || "";
        document.getElementById('override-btn').classList.remove('hidden');
        nextBtn.focus();
    }

    // 解答の判定
    function submitUserAnswer() {
        const userInput = document.getElementById('user-answer').value.trim();
        if (!userInput) {
            alert("解答を入力してください！");
            return;
        }

        stopTimer();
        const currentQ = activeQuestions[activeIndex];
        const normalizedInput = hiraganize(userInput);

        // クイズ側の正解判定リストを平仮名等に完全平準化
        const normalizedCorrectList = currentQ.ans.map(ansItem => hiraganize(ansItem));

        // ひらがな・漢字のブレを克服する、高度部分一致/包含判定
        const isCorrect = normalizedCorrectList.some(correctItem => {
            return normalizedInput.includes(correctItem) || correctItem.includes(normalizedInput);
        });

        const feedbackPanel = document.getElementById('feedback-panel');
        const submitBtn = document.getElementById('submit-btn');
        const nextBtn = document.getElementById('next-btn');
        const answerInput = document.getElementById('user-answer');

        answerInput.disabled = true;
        submitBtn.classList.add('hidden');
        nextBtn.classList.remove('hidden');

        feedbackPanel.classList.remove('hidden');

        if (isCorrect) {
            playSound('correct');
            totalScore++;
            feedbackPanel.className = "p-5 rounded-2xl border border-emerald-500/30 bg-emerald-500/10 text-emerald-300 fade-in";
            document.getElementById('feedback-icon').textContent = "⭕";
            document.getElementById('feedback-title').textContent = "正解！";
            // 苦手リストから削除
            removeFromWeakness(currentQ);
            // 正解時は救済ボタンは不要なので隠す
            document.getElementById('override-btn').classList.add('hidden');
        } else {
            playSound('incorrect');
            feedbackPanel.className = "p-5 rounded-2xl border border-rose-500/30 bg-rose-500/10 text-rose-300 fade-in";
            document.getElementById('feedback-icon').textContent = "❌";
            document.getElementById('feedback-title').textContent = "不正解...";
            // 苦手リストに登録
            addToWeakness(currentQ);
            // 救済ボタンを表示
            document.getElementById('override-btn').classList.remove('hidden');
        }

        document.getElementById('feedback-correct-answers').innerHTML = `正解: <span class="text-white underline decoration-amber-400 font-bold">${currentQ.ans.join("、")}</span>`;
        document.getElementById('feedback-explanation').textContent = currentQ.exp || "";

        nextBtn.focus();
    }

    // おまけ正解救済措置（ユーザーによる手動オーバーライド）
    function overrideAsCorrect() {
        playSound('correct');
        const feedbackPanel = document.getElementById('feedback-panel');
        const currentQ = activeQuestions[activeIndex];

        totalScore++;
        // 苦手リストから除外
        removeFromWeakness(currentQ);

        feedbackPanel.className = "p-5 rounded-2xl border border-emerald-500/30 bg-emerald-500/10 text-emerald-300 fade-in";
        document.getElementById('feedback-icon').textContent = "⭕";
        document.getElementById('feedback-title').textContent = "正解（自己判定による修正完了）";
        document.getElementById('override-btn').classList.add('hidden');
    }

    // 苦手問題登録・除外
    function addToWeakness(questionObj) {
        if (!weaknessList.some(item => item.q === questionObj.q)) {
            weaknessList.push(questionObj);
            saveWeakness();
        }
    }

    function removeFromWeakness(questionObj) {
        weaknessList = weaknessList.filter(item => item.q !== questionObj.q);
        saveWeakness();
    }

    // 次の問題
    function goToNextQuestion() {
        playSound('click');
        activeIndex++;
        if (activeIndex < activeQuestions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    // リザルト表示
    function showResult() {
        document.getElementById('play-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        document.getElementById('result-score').textContent = `${totalScore} / ${activeQuestions.length}`;
        const ratio = totalScore / activeQuestions.length;
        const percent = Math.round(ratio * 100);
        document.getElementById('result-percent').textContent = `${percent}%`;

        // 進捗の保存
        if (typeof activeMode === 'number') {
            const previousProgress = modeProgress[activeMode] || 0;
            if (percent > previousProgress) {
                modeProgress[activeMode] = percent;
                localStorage.setItem('history_quiz_progress_v2', JSON.stringify(modeProgress));
            }
        }

        // コメント生成
        let comment = "";
        if (percent === 100) {
            comment = "超完璧！！素晴らしい知識です。大正・明治・幕末のすべてを完全にマスターしています！このまま本番に挑みましょう！🎉";
        } else if (percent >= 80) {
            comment = "極めて優秀です！間違えた問題は自動的に苦手特訓モードに保存されています。復習機能で100%を目指そう！💪";
        } else if (percent >= 50) {
            comment = "合格レベルまであと一歩！出来事の『西暦・人物・内容』の3点を結びつけて学習するのがポイントです。";
        } else {
            comment = "復習のチャンス！歴史の流れやキーワードを頭に入れるために、何度も繰り返し解答を記述してみましょう！✊";
        }
        document.getElementById('result-comment').textContent = comment;
    }

    // エンターキーの挙動制御
    function handleEnterKey(event) {
        if (event.key === "Enter") {
            const submitBtn = document.getElementById('submit-btn');
            const nextBtn = document.getElementById('next-btn');

            if (!submitBtn.classList.contains('hidden')) {
                submitUserAnswer();
            } else if (!nextBtn.classList.contains('hidden')) {
                goToNextQuestion();
            }
        }
    }

    // やり直しと戻る
    function restartCurrentMode() {
        startQuiz(activeMode);
    }

    function backToMenu() {
        playSound('click');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('play-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
        drawMenu();
    }

    // 起動
    window.onload = function() {
        drawMenu();
        // Lucideアイコンのレンダリング
        lucide.createIcons();
    };
</script>

</body>
